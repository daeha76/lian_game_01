<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>리안이의 요리 게임 🍰</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      font-family: "Comic Sans MS", "Apple SD Gothic Neo", "맑은 고딕", sans-serif;
      background: linear-gradient(180deg, #fff5f9 0%, #d4f5d4 100%);
      overflow: hidden; touch-action: manipulation;
    }
    #app { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; }
    .bg-dots {
      position: absolute; inset: 0; pointer-events: none; opacity: 0.7; z-index: 0;
      background-image:
        radial-gradient(circle at 20% 15%, #ffd1e0 18px, transparent 19px),
        radial-gradient(circle at 50% 10%, #ffd1e0 16px, transparent 17px),
        radial-gradient(circle at 80% 18%, #ffd1e0 18px, transparent 19px),
        radial-gradient(circle at 30% 35%, #ffd1e0 14px, transparent 15px),
        radial-gradient(circle at 70% 38%, #ffd1e0 16px, transparent 17px),
        radial-gradient(circle at 15% 55%, #ffd1e0 14px, transparent 15px),
        radial-gradient(circle at 85% 60%, #ffd1e0 16px, transparent 17px);
    }
    #stage {
      position: relative; z-index: 1; width: 100%; max-width: 600px; flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: space-between;
      padding: 16px; gap: 12px;
    }
    #speech {
      background: white; border: 4px solid #ffb3cc; border-radius: 24px;
      padding: 18px 24px; min-height: 70px; width: 100%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 0 #ffb3cc;
    }
    #message {
      margin: 0; font-size: clamp(20px, 5vw, 28px); font-weight: bold;
      color: #d6457f; text-align: center; line-height: 1.3;
    }
    #play-area {
      flex: 1; width: 100%; display: flex; align-items: center; justify-content: center;
      position: relative; min-height: 200px; flex-wrap: wrap;
    }
    .big-btn {
      font-family: inherit; font-size: clamp(22px, 5.5vw, 32px); font-weight: bold;
      color: white; background: linear-gradient(180deg, #ff8eb5 0%, #ff5d92 100%);
      border: none; border-radius: 30px; padding: 18px 48px; min-width: 200px;
      box-shadow: 0 6px 0 #d6457f, 0 8px 16px rgba(255, 93, 146, 0.3);
      cursor: pointer; transition: transform 0.1s, box-shadow 0.1s;
    }
    .big-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #d6457f, 0 4px 8px rgba(255, 93, 146, 0.3); }
    .big-btn.hidden { display: none; }
    #progress {
      width: calc(100% - 32px); max-width: 600px; height: 14px;
      background: white; border: 3px solid #ffb3cc; border-radius: 10px;
      overflow: hidden; margin-bottom: 12px; z-index: 1;
    }
    #progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #ffb3cc, #ff5d92); transition: width 0.4s ease; }
    .item {
      display: inline-flex; flex-direction: column; align-items: center;
      margin: 8px; font-size: clamp(56px, 14vw, 96px);
      animation: pop-in 0.4s ease; cursor: pointer;
    }
    .item .label { font-size: clamp(14px, 3.5vw, 18px); color: #d6457f; font-weight: bold; margin-top: 4px; }
    @keyframes pop-in { 0% { transform: scale(0); } 60% { transform: scale(1.2); } 100% { transform: scale(1); } }
    .dough {
      width: 140px; height: 140px; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff0d4, #f5d99f);
      box-shadow: inset -8px -8px 0 rgba(0,0,0,0.05);
      cursor: pointer; transition: transform 0.2s ease, border-radius 0.2s;
    }
    .stove {
      width: 220px; height: 180px; background: #888; border-radius: 16px;
      position: relative; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 0 #555;
    }
    .stove .burner {
      width: 130px; height: 130px; border-radius: 50%;
      background: radial-gradient(circle, #333 0%, #555 70%);
      display: flex; align-items: center; justify-content: center; font-size: 70px;
    }
    .stove.on .burner { background: radial-gradient(circle, #ff7a3d 0%, #c04020 70%); animation: flicker 0.4s infinite alternate; }
    @keyframes flicker { from { box-shadow: 0 0 20px #ffb070; } to { box-shadow: 0 0 40px #ff7a3d; } }
    .lid {
      position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
      width: 180px; height: 24px; background: #aaa; border-radius: 12px 12px 4px 4px;
      cursor: pointer; transition: transform 0.5s ease;
    }
    .lid.open { transform: translateX(-50%) translateY(-60px) rotate(-15deg); }
    .bread { font-size: clamp(80px, 18vw, 130px); cursor: pointer; transition: transform 0.3s, filter 0.3s; }
    .jam-area { position: relative; width: 240px; height: 240px; display: flex; align-items: center; justify-content: center; }
    .jam-area canvas { position: absolute; inset: 0; cursor: crosshair; touch-action: none; }
    .finale { display: flex; flex-direction: column; align-items: center; text-align: center; }
    .finale img { max-width: 80vw; max-height: 50vh; border-radius: 20px; box-shadow: 0 8px 24px rgba(214, 69, 127, 0.3); animation: bounce-in 0.8s ease; }
    .finale .placeholder-cake {
      width: 220px; height: 220px; border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #ffd1e0 0%, #ff8eb5 70%);
      display: flex; align-items: center; justify-content: center;
      font-size: 80px; box-shadow: 0 8px 24px rgba(214, 69, 127, 0.3);
      animation: bounce-in 0.8s ease;
    }
    @keyframes bounce-in { 0% { transform: scale(0) rotate(-30deg); } 60% { transform: scale(1.2) rotate(10deg); } 100% { transform: scale(1) rotate(0); } }
    .sparkles { font-size: 40px; margin: 16px 0; animation: sparkle 1.2s infinite; }
    @keyframes sparkle { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.1); } }
    @media (max-height: 500px) { #speech { padding: 10px 18px; min-height: 50px; } .big-btn { padding: 12px 32px; } }
  </style>
</head>
<body>
  <div id="app">
    <div class="bg-dots"></div>
    <main id="stage">
      <div id="speech"><p id="message">오늘은 무엇을 만들까?</p></div>
      <div id="play-area"></div>
      <button id="action-btn" class="big-btn">시작!</button>
    </main>
    <div id="progress"><div id="progress-fill"></div></div>
  </div>

  <script>
  /* ============================================================ */
  /* 레시피 - 새 음식 추가는 여기 RECIPES 객체에 한 덩어리만 추가 */
  /* ============================================================ */
  const RECIPES = {
    strawberry_bread: {
      name: "딸기 빵",
      finalImage: "assets/strawberry-bread.png",
      steps: [
        { type: "talk",        message: "오늘은 핑크색 음식을 만들어 볼까? 🎀", button: "알았어!" },
        { type: "ingredients", message: "재료를 모아왔어! 톡톡 눌러봐",
          items: [
            { emoji: "🌾", label: "밀가루" },
            { emoji: "🥛", label: "우유" },
            { emoji: "🍓", label: "딸기" },
            { emoji: "🥚", label: "달걀" }
          ],
          button: "다 모았어!"
        },
        { type: "knead",     message: "반죽을 조물조물! 5번 눌러봐",        target: 5 },
        { type: "roll",      message: "이번엔 반죽을 밀어볼까? 5번 더!",     target: 5 },
        { type: "stove_in",  message: "안 구운 빵을 가스레인지에 넣자!" },
        { type: "cook",      message: "맛있게 구워지는 중... 🔥",           duration: 3000 },
        { type: "lid_open",  message: "다 됐다! 뚜껑을 열어봐" },
        { type: "take_out",  message: "빵을 꺼내자!" },
        { type: "jam",       message: "딸기잼을 발라봐! 손가락으로 문질문질~", target: 0.4 },
        { type: "finale",    message: "완성! 정말 잘했어! 🎉",              button: "다시 하기" }
      ]
    }
  };

  /* ============================================================ */
  /* 게임 엔진 */
  /* ============================================================ */
  const messageEl = document.getElementById('message');
  const playArea  = document.getElementById('play-area');
  const btn       = document.getElementById('action-btn');
  const progress  = document.getElementById('progress-fill');

  let currentRecipe = null;
  let stepIndex = 0;

  function init() {
    messageEl.textContent = "오늘은 무엇을 만들까?";
    playArea.innerHTML = "";
    btn.textContent = "시작!";
    btn.classList.remove('hidden');
    progress.style.width = "0%";
    btn.onclick = startGame;
  }

  function startGame() {
    const keys = Object.keys(RECIPES);
    const key = keys[Math.floor(Math.random() * keys.length)];
    currentRecipe = RECIPES[key];
    stepIndex = 0;
    runStep();
  }

  function updateProgress() {
    const total = currentRecipe.steps.length;
    progress.style.width = ((stepIndex / total) * 100) + "%";
  }

  function nextStep() {
    stepIndex++;
    if (stepIndex >= currentRecipe.steps.length) { init(); return; }
    runStep();
  }

  function runStep() {
    updateProgress();
    const step = currentRecipe.steps[stepIndex];
    messageEl.textContent = step.message;
    playArea.innerHTML = "";
    if (step.button) {
      btn.textContent = step.button;
      btn.classList.remove('hidden');
      btn.onclick = nextStep;
    } else {
      btn.classList.add('hidden');
    }
    const handler = stepHandlers[step.type];
    if (handler) handler(step);
  }

  const stepHandlers = {
    talk(step) { /* 메시지만 */ },

    ingredients(step) {
      let tappedCount = 0;
      step.items.forEach(({ emoji, label }) => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `<span>${emoji}</span><span class="label">${label}</span>`;
        div.onclick = () => {
          if (div.dataset.tapped) return;
          div.dataset.tapped = "1";
          div.style.transform = "scale(1.3)";
          setTimeout(() => div.style.transform = "scale(1)", 200);
          tappedCount++;
          if (tappedCount === step.items.length) messageEl.textContent = "다 만져봤구나! 좋아!";
        };
        playArea.appendChild(div);
      });
    },

    knead(step) {
      let count = 0;
      const dough = document.createElement('div');
      dough.className = 'dough';
      dough.onclick = () => {
        count++;
        const scale = 1 - count * 0.05;
        dough.style.transform = `scale(${scale}, ${1 + count * 0.03})`;
        messageEl.textContent = `조물조물! ${count}/${step.target}`;
        if (count >= step.target) setTimeout(nextStep, 500);
      };
      playArea.appendChild(dough);
    },

    roll(step) {
      let count = 0;
      const dough = document.createElement('div');
      dough.className = 'dough';
      dough.style.transform = "scaleY(0.85)";
      dough.onclick = () => {
        count++;
        const flatten = 0.85 - count * 0.1;
        dough.style.transform = `scaleY(${flatten}) scaleX(${1 + count * 0.08})`;
        dough.style.borderRadius = `${50 - count * 8}%`;
        messageEl.textContent = `밀어밀어! ${count}/${step.target}`;
        if (count >= step.target) setTimeout(nextStep, 500);
      };
      playArea.appendChild(dough);
    },

    stove_in(step) {
      const wrap = document.createElement('div');
      wrap.style.cssText = "display:flex; gap:20px; align-items:center; flex-wrap:wrap; justify-content:center;";
      const bread = document.createElement('div');
      bread.className = 'bread';
      bread.textContent = '🍞';
      const stove = document.createElement('div');
      stove.className = 'stove';
      stove.innerHTML = '<div class="burner"></div>';
      bread.onclick = () => {
        bread.style.transition = "all 0.6s ease";
        bread.style.transform = "translateX(60px) scale(0.6)";
        bread.style.opacity = "0";
        setTimeout(() => {
          stove.querySelector('.burner').textContent = '🍞';
          setTimeout(nextStep, 400);
        }, 500);
      };
      wrap.appendChild(bread);
      wrap.appendChild(stove);
      playArea.appendChild(wrap);
    },

    cook(step) {
      const stove = document.createElement('div');
      stove.className = 'stove on';
      stove.innerHTML = '<div class="burner">🍞</div>';
      playArea.appendChild(stove);
      let dots = 0;
      const interval = setInterval(() => {
        dots = (dots + 1) % 4;
        messageEl.textContent = "맛있게 구워지는 중" + ".".repeat(dots) + " 🔥";
      }, 400);
      setTimeout(() => {
        clearInterval(interval);
        stove.querySelector('.burner').textContent = '🥖';
        nextStep();
      }, step.duration);
    },

    lid_open(step) {
      const stove = document.createElement('div');
      stove.className = 'stove';
      stove.innerHTML = '<div class="lid"></div><div class="burner">🥖</div>';
      const lid = stove.querySelector('.lid');
      lid.onclick = () => { lid.classList.add('open'); setTimeout(nextStep, 700); };
      playArea.appendChild(stove);
    },

    take_out(step) {
      const bread = document.createElement('div');
      bread.className = 'bread';
      bread.textContent = '🥖';
      bread.onclick = () => {
        bread.style.transition = "all 0.5s ease";
        bread.style.transform = "translateY(-100px) scale(1.4)";
        setTimeout(nextStep, 500);
      };
      playArea.appendChild(bread);
    },

    jam(step) {
      const wrap = document.createElement('div');
      wrap.className = 'jam-area';
      const bread = document.createElement('div');
      bread.style.cssText = "font-size:180px; position:absolute;";
      bread.textContent = '🥖';
      const canvas = document.createElement('canvas');
      canvas.width = 240; canvas.height = 240;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = "#ff5d92";
      let painting = false;
      function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : e;
        return { x: t.clientX - rect.left, y: t.clientY - rect.top };
      }
      function paint(e) {
        if (!painting) return;
        const { x, y } = getPos(e);
        ctx.beginPath(); ctx.arc(x, y, 22, 0, Math.PI * 2); ctx.fill();
        if (Math.random() < 0.2) {
          const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
          let p = 0;
          for (let i = 3; i < data.length; i += 4) if (data[i] > 0) p++;
          if (p / (canvas.width * canvas.height) >= step.target) {
            messageEl.textContent = "잼이 듬뿍! 맛있겠다 😋";
            painting = false;
            setTimeout(nextStep, 700);
          }
        }
      }
      canvas.addEventListener('mousedown', e => { painting = true; paint(e); });
      canvas.addEventListener('mousemove', paint);
      canvas.addEventListener('mouseup',   () => painting = false);
      canvas.addEventListener('mouseleave',() => painting = false);
      canvas.addEventListener('touchstart',e => { painting = true; paint(e); e.preventDefault(); });
      canvas.addEventListener('touchmove', e => { paint(e); e.preventDefault(); });
      canvas.addEventListener('touchend',  () => painting = false);
      wrap.appendChild(bread);
      wrap.appendChild(canvas);
      playArea.appendChild(wrap);
    },

    finale(step) {
      const div = document.createElement('div');
      div.className = 'finale';
      const img = document.createElement('img');
      img.src = currentRecipe.finalImage;
      img.alt = currentRecipe.name;
      img.onerror = () => {
        img.remove();
        const ph = document.createElement('div');
        ph.className = 'placeholder-cake';
        ph.textContent = '🍰';
        div.insertBefore(ph, div.firstChild);
      };
      div.appendChild(img);
      const sparkles = document.createElement('div');
      sparkles.className = 'sparkles';
      sparkles.textContent = '✨ 🌟 ✨';
      div.appendChild(sparkles);
      playArea.appendChild(div);
      progress.style.width = "100%";
    }
  };

  init();
  </script>
</body>
</html>
